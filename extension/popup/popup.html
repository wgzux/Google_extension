<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Redmine Helper</title>
    <link rel="stylesheet" href="popup.css">
</head>
<body>
    <div class="container">
        <div class="header">
            <img src="../images/icon.png" alt="icon" class="logo">
            <h1>Redmine Helper</h1>
            <span class="version">v3.0.0</span>
        </div>

        <!-- Status indicator -->
        <div id="status-bar" class="status-bar disconnected">
            <span class="status-dot"></span>
            <span id="status-text">Chưa kết nối</span>
        </div>

        <!-- Form cấu hình -->
        <div class="form-group">
            <label for="redmine-url">🌐 Redmine URL</label>
            <input type="url" id="redmine-url" placeholder="http://localhost:3000" />
        </div>

        <div class="form-group">
            <label for="api-key">🔑 API Key</label>
            <input type="password" id="api-key" placeholder="Lấy từ My Account → API access key" />
            <small><a href="#" id="show-key">Hiện/Ẩn</a></small>
        </div>

        <div class="form-group">
            <label for="backend-url">⚙️ Backend URL</label>
            <input type="url" id="backend-url" placeholder="http://localhost:4000" value="http://localhost:4000" />
        </div>

        <!-- Buttons -->
        <div class="btn-group">
            <button id="btn-test" class="btn btn-secondary">
                🔍 Test Connection
            </button>
            <button id="btn-save" class="btn btn-primary">
                💾 Lưu & Đăng ký
            </button>
        </div>

        <button id="btn-sync" class="btn btn-full btn-accent" disabled>
            🔄 Sync Config từ Redmine
        </button>

        <!-- Result message -->
        <div id="message" class="message hidden"></div>

        <!-- Info khi đã kết nối -->
        <div id="user-info" class="user-info hidden">
            <div class="info-row">
                <span class="label">👤 User:</span>
                <span id="user-name">-</span>
            </div>
            <div class="info-row">
                <span class="label">🌐 Server:</span>
                <span id="server-url">-</span>
            </div>
        </div>
    </div>

    <script src="popup.js"></script>
</body>
</html>
